services:
  postgres:
    image: postgres:15-alpine
    container_name: go_postgres_mini_ecomerce
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_mini_ecomerce_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - api_network

  redis:
    image: redis:7-alpine
    container_name: go_redis_mini_ecomerce
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: .env
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_mini_ecomerce_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - api_network


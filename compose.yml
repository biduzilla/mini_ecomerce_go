  ms-auth:
    build:
      context: ./ms_auth
      dockerfile: Dockerfile
    container_name: ms_auth_api
    env_file: ./ms_auth/.env
    environment:
      DB_DSN: ${DB_DSN}
    ports:
      - "${AUTH_SERVER_PORT}:${AUTH_SERVER_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ms_auth/migrations:/root/migrations
      - ./ms_auth/internal/config:/root/config
      - ./ms_auth/resources/keys:/root/api/resources/keys
    networks:
      - api_network

volumes:
  postgres_mini_ecomerce_data:
  redis_mini_ecomerce_data:
  # prometheus_data:
  # grafana_data:

networks:
  api_network:
    driver: bridge